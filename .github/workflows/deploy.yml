# .github/workflows/deploy.yml
# Place this file at:  crypto_api/.github/workflows/deploy.yml
#
# Triggers: every push to main
# What it does:
#   1. Builds the Vite frontend
#   2. Deploys the dist/ folder to the gh-pages branch
#   3. GitHub Pages serves that branch at https://<user>.github.io/crypto_api/

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive    # pulls galoiscore + crypto_systems submodules

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crypto_frontend/galois-explorer/package-lock.json

      - name: Install dependencies
        working-directory: crypto_frontend/galois-explorer
        run: npm ci

      - name: Build
        working-directory: crypto_frontend/galois-explorer
        env:
          # Inject your Render backend URL at build time.
          # Set this secret in:
          #   GitHub repo → Settings → Secrets → Actions → New repository secret
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: crypto_frontend/galois-explorer/dist
          # Keeps the gh-pages branch clean on every deploy
          force_orphan: true